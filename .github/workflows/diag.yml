name: Nettverkstest

on:
  workflow_dispatch:

jobs:
  test-network:
    runs-on: ubuntu-latest
    steps:
      - name: Test tilgang til eksterne domener
        run: |
          echo "=== DMP ==="
          curl -s -o /dev/null -w "DMP: %{http_code}\n" --max-time 10 "https://www.dmp.no" || echo "DMP: FEILET"
          echo "=== Felleskatalogen ==="
          curl -s -o /dev/null -w "FK: %{http_code}\n" --max-time 10 "https://www.felleskatalogen.no" || echo "FK: FEILET"
          echo "=== Google ==="
          curl -s -o /dev/null -w "Google: %{http_code}\n" --max-time 10 "https://www.google.com" || echo "Google: FEILET"
          echo "=== Apotek1 ==="
          curl -s -o /dev/null -w "Apotek1: %{http_code}\n" --max-time 10 "https://www.apotek1.no" || echo "Apotek1: FEILET"
