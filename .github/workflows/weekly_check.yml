name: Ukentlig tilgjengelighetssjekk

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

jobs:
  check-availability:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Sjekk ut repo
        uses: actions/checkout@v4

      - name: Sett opp Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Kjør tilgjengelighetssjekk
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python fetch_status.py

      - name: Kopier status.json til docs/ for GitHub Pages
        run: cp data/status.json docs/status.json

      - name: Commit og push
        run: |
          git config user.name  "GynForum StatusBot"
          git config user.email "bot@gynforum.com"
          git add data/status.json docs/status.json
          git diff --cached --quiet || \
            git commit -m "🔄 Automatisk sjekk $(date +'%d.%m.%Y')"
          git push
