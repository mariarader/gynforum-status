name: Ukentlig tilgjengelighetssjekk

on:
  schedule:
    - cron: "0 7 * * 1"   # Hver mandag kl. 07:00 UTC = 08/09 norsk tid
  workflow_dispatch:        # Manuell kjøring fra GitHub UI

jobs:
  check-availability:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Sjekk ut repo
        uses: actions/checkout@v4

      - name: Sett opp Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer Playwright og Chromium
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Kjør tilgjengelighetssjekk
        run: python fetch_status.py

      - name: Commit og push status.json
        run: |
          git config user.name  "GynForum StatusBot"
          git config user.email "bot@gynforum.com"
          git add data/status.json
          git diff --cached --quiet || \
            git commit -m "🔄 Automatisk sjekk $(date +'%d.%m.%Y')"
          git push
